<div class="plan-card" [class.active]="active" (click)="onSelect()" (keydown.enter)="onSelect()" (keydown.space)="onSelect()" tabindex="0" role="button">
  <div class="plan-card__header">
    <h3>{{ plan.title }}</h3>
    <button class="icon-btn" type="button" [attr.aria-label]="dictionary().deletePlan" (click)="onDelete($event)">🗑</button>
  </div>

  <div class="plan-card__date">📅 {{ plan.createdAt }}</div>

  <ul class="plan-card__courses">
    @for (course of plan.courses.slice(0, 3); track course) {
      <li>{{ course }}</li>
    }

    @if (plan.courses.length > 3) {
      <li class="more">{{ dictionary().moreCourses(plan.courses.length - 3) }}</li>
    }
  </ul>
</div>
